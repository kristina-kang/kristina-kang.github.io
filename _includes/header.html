<script>
  const dropdownToggle = document.querySelector('.dropdown-toggle');
  const dropdownMenu = dropdownToggle.querySelector('.dropdown');

  // Desktop hover
  dropdownToggle.addEventListener('mouseenter', () => { dropdownMenu.style.display = 'block'; });
  dropdownToggle.addEventListener('mouseleave', () => { dropdownMenu.style.display = 'none'; });

  // Mobile click toggle
  dropdownToggle.addEventListener('click', (e) => {
    e.preventDefault();
    if (dropdownMenu.style.display === 'block') {
      dropdownMenu.style.display = 'none';
    } else {
      dropdownMenu.style.display = 'block';
    }
  });
</script>
