<nav style="
  background-color:#ffffff;
  padding:16px 24px;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
">

  <!-- Left: Name -->
  <div>
    <a href="/" style="
      text-decoration:none;
      color:#111827;
      font-weight:600;
      font-size:18px;
      letter-spacing:0.3px;
    ">
      Kristina Kang
    </a>
  </div>

  <!-- Right: Navigation -->
  <div style="display:flex; gap:32px; align-items:center;">

    <a href="/" style="text-decoration:none; color:#374151; font-weight:500;">
      Home
    </a>

    <!-- Projects Dropdown -->
    <div style="position:relative;" class="dropdown-wrapper">
      <span style="
        cursor:pointer;
        color:#374151;
        font-weight:500;
        display:flex;
        align-items:center;
        gap:6px;
      ">
        Projects
        <span style="
          font-size:16px;
          line-height:1;
          color:#6b7280;
        ">
          ▾
        </span>
      </span>

      <div style="
        display:none;
        position:absolute;
        top:120%;
        right:0;
        background:#ffffff;
        border:1px solid #e5e7eb;
        border-radius:10px;
        min-width:240px;
        box-shadow:0 12px 30px rgba(0,0,0,0.08);
        padding:8px 0;
      " class="dropdown-menu">

        <a href="/projects/project1" style="display:block; padding:10px 20px; color:#374151; text-decoration:none;">
          Sales Analysis
        </a>

        <a href="/projects/project2" style="display:block; padding:10px 20px; color:#374151; text-decoration:none;">
          Customer Churn
        </a>

        <a href="/projects/project3" style="display:block; padding:10px 20px; color:#374151; text-decoration:none;">
          Dashboard Project
        </a>

        <a href="/projects/project4" style="display:block; padding:10px 20px; color:#374151; text-decoration:none;">
          End-to-End Case Study
        </a>

      </div>
    </div>

    <a href="/resume" style="text-decoration:none; color:#374151; font-weight:500;">
      Resume
    </a>

    <a href="/contact" style="text-decoration:none; color:#374151; font-weight:500;">
      Contact
    </a>

  </div>

</nav>

<script>
  const wrapper = document.querySelector('.dropdown-wrapper');
  const menu = wrapper.querySelector('.dropdown-menu');

  let timeout;

  wrapper.addEventListener('mouseenter', () => {
    clearTimeout(timeout);
    menu.style.display = 'block';
  });

  wrapper.addEventListener('mouseleave', () => {
    timeout = setTimeout(() => {
      menu.style.display = 'none';
    }, 180); // delay prevents flicker
  });

  wrapper.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  });

  document.addEventListener('click', () => {
    menu.style.display = 'none';
  });

  const links = menu.querySelectorAll('a');
  links.forEach(link => {
    link.addEventListener('mouseenter', () => {
      link.style.backgroundColor = '#f3f4f6';
    });
    link.addEventListener('mouseleave', () => {
      link.style.backgroundColor = 'transparent';
    });
  });
</script>
